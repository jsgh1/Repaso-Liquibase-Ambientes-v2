services:
  db:
    image: mysql:8.4
    container_name: mysql_cafeteria_v2
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cafeteria_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_cafeteria_v2:/var/lib/mysql

  liquibase:
    image: liquibase/liquibase:latest
    container_name: liquibase_cafeteria_v2
    depends_on:
      - db
    volumes:
      - ./:/liquibase/changelog
    working_dir: /liquibase/changelog
    command:
      - --defaultsFile=liquibase.properties
      - update

volumes:
  mysql_data_cafeteria_v2: